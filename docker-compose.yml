services:
  db-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 3s
      timeout: 3s
      retries: 20

  cache-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  db-init:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    command: >
      sh -c "python manage.py migrate --no-input &&
             python manage.py seed_demo --idempotent"
    depends_on:
      db-postgres:
        condition: service_healthy

  api-django:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db-postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  worker-celery:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    command: celery -A hhps worker --loglevel=info
    depends_on:
      db-postgres:
        condition: service_healthy
      cache-redis:
        condition: service_started
      db-init:
        condition: service_completed_successfully

  rt-node:
    build:
      context: .
      dockerfile: apps/rt-node/Dockerfile
    environment:
      PORT: "8080"
      REDIS_URL: redis://cache-redis:6379/0
      # Must match what Django computes as SIMPLE_JWT SIGNING_KEY.
      # For the seeded .env with DJANGO_SECRET_KEY >= 32 bytes, these are
      # the same string; shorter keys would need explicit sha256 derivation.
      JWT_SIGNING_KEY: ${DJANGO_SECRET_KEY}
    ports:
      - "8080:8080"
    depends_on:
      cache-redis:
        condition: service_started

  web-ops:
    build:
      context: .
      dockerfile: apps/web-ops/Dockerfile
    environment:
      # Browser-side URLs — must be reachable from the host.
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_RT_URL: ws://localhost:8080
    ports:
      - "3001:3001"
    depends_on:
      api-django:
        condition: service_started
      rt-node:
        condition: service_started

volumes:
  pgdata:
