services:
  db-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 3s
      timeout: 3s
      retries: 20

  cache-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  db-init:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    command: >
      sh -c "python manage.py migrate --no-input &&
             python manage.py seed_demo --idempotent"
    depends_on:
      db-postgres:
        condition: service_healthy

  api-django:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db-postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  worker-celery:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    command: celery -A hhps worker --loglevel=info
    depends_on:
      db-postgres:
        condition: service_healthy
      cache-redis:
        condition: service_started
      db-init:
        condition: service_completed_successfully

  rt-node:
    build:
      context: .
      dockerfile: apps/rt-node/Dockerfile
    environment:
      PORT: "8080"
      REDIS_URL: redis://cache-redis:6379/0
      # Must match what Django computes as SIMPLE_JWT SIGNING_KEY.
      # For the seeded .env with DJANGO_SECRET_KEY >= 32 bytes, these are
      # the same string; shorter keys would need explicit sha256 derivation.
      JWT_SIGNING_KEY: ${DJANGO_SECRET_KEY}
    ports:
      - "8080:8080"
    depends_on:
      cache-redis:
        condition: service_started

  web-ops:
    build:
      context: .
      dockerfile: apps/web-ops/Dockerfile
    environment:
      # Browser-side URLs — must be reachable from the host.
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_RT_URL: ws://localhost:8080
    ports:
      - "3001:3001"
    depends_on:
      api-django:
        condition: service_started
      rt-node:
        condition: service_started

  web-marketing:
    build:
      context: .
      dockerfile: apps/web-marketing/Dockerfile
    environment:
      NEXT_PUBLIC_APP_URL: http://localhost:3001
    ports:
      - "3002:3002"

  # One-shot Metabase provisioner. Waits for /api/health, creates the
  # admin user, registers the read-only DB, builds an "Agency overview"
  # dashboard, marks it public, and prints the public URL. Re-runnable:
  # if Metabase is already set up, exits 0 with a no-op log.
  bi-metabase-bootstrap:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    command: >
      sh -c "uv run python manage.py metabase_bootstrap
             --base-url http://bi-metabase:3000"
    depends_on:
      bi-metabase:
        condition: service_healthy
    restart: "no"

  bi-metabase:
    image: metabase/metabase:v0.51.7
    environment:
      # Metabase's own metadata DB (H2 — fine for local demo).
      MB_DB_FILE: /metabase-data/metabase.db
      # Connection hints for Metabase's first-boot wizard. The
      # read-only role and its grants are created by reporting
      # migration 0002. Point the wizard at:
      #   host=db-postgres  port=5432  db=hhps
      #   user=metabase_ro  password=metabase_ro_demo
      # The role can SELECT on the `reporting` schema only.
    ports:
      - "3000:3000"
    volumes:
      - metabasedata:/metabase-data
    depends_on:
      db-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  pgdata:
  metabasedata:
