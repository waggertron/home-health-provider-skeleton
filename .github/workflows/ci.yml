name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: api — lint + typecheck + pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hhps
          POSTGRES_PASSWORD: hhps_dev_only
          POSTGRES_DB: hhps_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U hhps"
          --health-interval=3s
          --health-timeout=3s
          --health-retries=20
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=3s
          --health-timeout=3s
          --health-retries=20

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: hhps
      POSTGRES_PASSWORD: hhps_dev_only
      POSTGRES_DB: hhps_test
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      DJANGO_SECRET_KEY: ci-secret-long-enough-for-hs256-signing-0123456789abcdef
      DJANGO_DEBUG: "0"
      DEMO_PASSWORD: demo1234

    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.6.9"

      - name: Set up Python
        run: uv python install

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Typecheck (mypy)
        run: uv run mypy hhps tenancy accounts core seed clinicians patients visits routing messaging scheduling reporting

      - name: Pytest
        run: uv run pytest -v

  rt-node:
    name: rt-node — typecheck + vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/rt-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/rt-node/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  web-ops:
    name: web-ops — typecheck + vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-ops
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web-ops/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  web-marketing:
    name: web-marketing — typecheck + vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-marketing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web-marketing/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
